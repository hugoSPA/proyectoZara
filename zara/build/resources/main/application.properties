spring.application.name=zara

# Configuración básica de H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Mostrar el SQL en la consola (muy útil para ver si busca bien)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola web de H2
spring.h2.console.enabled=true

# ¡LA MAGIA PARA QUE CARGUE LOS DATOS!
# 1. Fuerza a ejecutar los scripts SQL
spring.sql.init.mode=always
# 2. Obliga a que primero se creen las tablas de las @Entity, y luego se inserte el data.sql
spring.jpa.defer-datasource-initialization=true